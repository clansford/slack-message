name: Release

on:
  push:
    branches: [dev]

jobs:
  build_linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install --yes --no-install-recommends musl-tools

      - name: Install rustup targets
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Tar x86_64 binary
        run: tar -czvf slack-message-gnu-linux-x86_64.tar.gz -C target/x86_64-unknown-linux-musl/release slack-message


      - name: Generate SHA256 checksums
        run: |
          shasum -a 256 slack-message-gnu-linux-x86_64.tar.gz > slack-message-gnu-linux-x86_64.tar.gz.sha256

      - name: Upload gnu-linux-x86_64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: slack-message-gnu-linux-x86_64.tar.gz
          path: slack-message-gnu-linux-x86_64.tar.gz

      - name: Upload gnu-linux-x86_64 Artifact SHA
        uses: actions/upload-artifact@v4
        with:
          name: slack-message-gnu-linux-x86_64.tar.gz.sha256
          path: slack-message-gnu-linux-x86_64.tar.gz.sha256
