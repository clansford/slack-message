name: Release

on:
  push:
    branches: [dev]

jobs:
  build_linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup just
        uses: extractions/setup-just@v3
      - name: Install tools
        run: sudo apt-get install --yes --no-install-recommends musl-tools
      - name: Install rustup targets
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build
        run: just build release x86_64-unknown-linux-musl

      - name: Tar x86_64 binary
        run: tar -czvf slack-message-x86_64-unknown-linux-musl.tar.gz -C target/x86_64-unknown-linux-musl/release slack-message
      - name: Generate SHA256 checksums
        run: |
          shasum -a 256 slack-message-x86_64-unknown-linux-musl.tar.gz > slack-message-gnu-linux-x86_64.tar.gz.sha256

      - name: Upload x86_64-unknown-linux-musl Artifact
        uses: actions/upload-artifact@v4
        with:
          name: slack-message-x86_64-unknown-linux-musl.tar.gz
          path: slack-message-x86_64-unknown-linux-musl.tar.gz
      - name: Upload x86_64-unknown-linux-musl Artifact SHA
        uses: actions/upload-artifact@v4
        with:
          name: slack-message-x86_64-unknown-linux-musl.tar.gz.sha256
          path: slack-message-x86_64-unknown-linux-musl.tar.gz.sha256
